<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr.B Number</title>
<link rel="stylesheet" href="style.css">

<!-- Librairie QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="box">

  <h1>⚡ Mr.B Number</h1>
  <p class="subtitle">Numéros vérifiés • Livraison instantanée • 24/7</p>

  <div class="trust">
    ✅ Fiable & sécurisé  
    ⚡ Livraison rapide  
    💬 Support disponible  
  </div>

  <div class="offer">
    🎁 Offre limitée : 2 numéros pour le prix d’1 (nouveaux clients)
  </div>

  <select id="service">
    <option value="whatsapp">WhatsApp</option>
    <option value="telegram">Telegram</option>
  </select>

  <h3>Paiement sécurisé :</h3>
  <div id="paymentBox"></div>
  <div id="result"></div>

  <div class="reviews">
    ⭐⭐⭐⭐⭐ “Service rapide et fiable”  
    ⭐⭐⭐⭐⭐ “Numéro reçu en 1 min”  
    ⭐⭐⭐⭐⭐ “Je recommande 🔥”
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
